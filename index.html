
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/static/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stardust Audio Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
              serif: ['Cormorant Garamond', 'serif'],
              display: ['Cinzel', 'serif'],
            },
            animation: {
              'spin-slow': 'spin 10s linear infinite',
              'fade-in': 'fadeIn 1s ease-out forwards',
            },
            keyframes: {
                fadeIn: {
                    '0%': { opacity: '0' },
                    '100%': { opacity: '1' },
                }
            },
            boxShadow: {
              'vinyl': '0 0 20px rgba(0,0,0,0.8)',
              'glow': '0 0 40px var(--theme-color)',
            }
          }
        }
      }
    </script>
    <style>
      /* Custom scrollbar for lyrics */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      body {
        background-color: #050505;
        color: white;
        overflow: hidden; /* Prevent scrolling on body */
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .text-shadow-glow {
        text-shadow: 0 0 20px currentColor;
      }
      .player-slider {
        --player-slider-track-height: 16px;
        --player-slider-thumb-size: 16px;
        --player-slider-thumb-border-width: 2px;
        --player-slider-thumb-shadow: 0 4px 12px rgba(15, 23, 42, 0.22);
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        outline: none;
      }
      .player-slider::-webkit-slider-runnable-track {
        height: var(--player-slider-track-height);
        background: transparent;
        border-radius: 9999px;
      }
      .player-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: var(--player-slider-thumb-size);
        height: var(--player-slider-thumb-size);
        margin-top: calc((var(--player-slider-track-height) - var(--player-slider-thumb-size)) / 2);
        border-radius: 9999px;
        border: var(--player-slider-thumb-border-width) solid rgba(255, 255, 255, 0.84);
        background: #ffffff;
        box-shadow: var(--player-slider-thumb-shadow);
        transition: transform 180ms ease;
      }
      .player-slider:hover::-webkit-slider-thumb {
        transform: scale(1.08);
      }
      .player-slider::-moz-range-track {
        height: var(--player-slider-track-height);
        background: transparent;
        border-radius: 9999px;
      }
      .player-slider::-moz-range-thumb {
        width: var(--player-slider-thumb-size);
        height: var(--player-slider-thumb-size);
        border-radius: 9999px;
        border: var(--player-slider-thumb-border-width) solid rgba(255, 255, 255, 0.84);
        background: #ffffff;
        box-shadow: var(--player-slider-thumb-shadow);
        transition: transform 180ms ease;
      }
      .player-slider:hover::-moz-range-thumb {
        transform: scale(1.08);
      }
      .player-slider:disabled::-webkit-slider-thumb,
      .player-slider:disabled::-moz-range-thumb {
        transform: none;
      }
      .player-slider--compact {
        --player-slider-track-height: 14px;
        --player-slider-thumb-size: 12px;
      }
      .player-slider--volume {
        --player-slider-thumb-size: 16px;
        --player-slider-thumb-border-width: 0px;
        --player-slider-thumb-shadow: 0 3px 10px rgba(15, 23, 42, 0.18);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react-icons/": "https://aistudiocdn.com/react-icons@^5.5.0/",
    "vite": "https://aistudiocdn.com/vite@^7.2.4",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
